name: nightly-pipeline

# Nightly delta sync + on-demand trigger from the web app (/api/sync →
# repository_dispatch). Deltas are tiny, so this run is fast; the expensive
# first backfill is done once locally.
on:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC nightly
  workflow_dispatch: {}
  repository_dispatch:
    types: [sync]

concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Restore Tidal session
        env:
          TIDAL_SESSION_JSON: ${{ secrets.TIDAL_SESSION_JSON }}
        run: |
          if [ -n "$TIDAL_SESSION_JSON" ]; then
            printf '%s' "$TIDAL_SESSION_JSON" > .tidal-session.json
            chmod 600 .tidal-session.json
            echo "Tidal session restored."
          else
            echo "::warning::TIDAL_SESSION_JSON secret not set — ingest will be skipped, enrichment of pending jobs still runs."
          fi

      - name: Run pipeline (deltas)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCOGS_TOKEN: ${{ secrets.DISCOGS_TOKEN }}
          MUSICBRAINZ_APP_CONTACT: ${{ secrets.MUSICBRAINZ_APP_CONTACT }}
          TIDAL_SESSION_FILE: .tidal-session.json
        run: python -m pipeline.run_pipeline
